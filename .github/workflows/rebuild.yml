name: Rebuild on Content Update
on:
  repository_dispatch:
    types: [content-update]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Rebuild
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"uuid": "${{ secrets.COOLIFY_SITE_UUID }}"}' \
            "https://coolify.siberkale.com/api/v1/deploy"
          echo "✅ mto-site rebuild triggered"
